# Site settings
title: My GitHub Pages Site
description: A site showcasing my portfolio
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://gilbertokoerbes.github.io" # the base hostname & protocol for your site

# Build settings
markdown: kramdown
highlighter: rouge
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-mermaid

# Excludes
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules

# Markdown settings
kramdown:
  input: GFM
  syntax_highlighter_opts:
    line_numbers: true

# Mermaid support
gems:
  - jekyll-mermaid

# Other settings
paginate: 5
paginate_path: "/page:num/"

# Theme
theme: minima

# Custom variables
author: Your Name
email: your-email@example.com
